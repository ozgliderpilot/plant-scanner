name: Deploy GAS (test)

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/Code.gs"
      - "backend/shared.js"
      - ".github/workflows/deploy-gas-test.yml"

concurrency:
  group: deploy-gas-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Backend logic tests
        run: npm test

      - name: clasp credentials
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: clasp project (test)
        run: |
          cat > .clasp.test.json <<EOF
          {
            "scriptId": "${{ secrets.GAS_TEST_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push and redeploy test Web App
        run: |
          DESC="test-pr-${GITHUB_EVENT_PULL_REQUEST_NUMBER}-${GITHUB_SHA::7}-$(date -u +%Y%m%d%H%M%S)"
          npx clasp push --force --project .clasp.test.json
          npx clasp deploy \
            --project .clasp.test.json \
            --deploymentId "${{ secrets.GAS_TEST_DEPLOYMENT_ID }}" \
            --description "$DESC"
