name: Screenshot cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Skip fork PRs
        id: gate
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "Fork PRs have no ci-screenshots folder to prune; skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - name: Remove PR gallery from ci-screenshots
        if: steps.gate.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/screenshots/cleanup-pr-screenshots.sh
          .github/scripts/screenshots/cleanup-pr-screenshots.sh "${{ github.event.pull_request.number }}"
