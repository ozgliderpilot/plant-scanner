name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      backend: ${{ steps.filter.outputs.backend }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            app:
              - 'app/**'
              - 'core/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
              - '.github/workflows/ci.yml'
              - '.maestro/**'
              - '.github/scripts/screenshots/**'
              - '.github/workflows/screenshots-cleanup.yml'

  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Core unit tests
        run: gradle test

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Backend logic tests
        run: npm test

  app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-34 build-tools;34.0.0 platform-tools

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build qa debug APK
        run: ./gradlew :app:assembleQaDebug --stacktrace

      - name: Upload QA debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qa-debug-apk
          path: app/build/outputs/apk/qa/debug/app-qa-debug.apk
          retention-days: 5

  # Soft gallery job (#72): may go red on emulator/Maestro failure but is NOT in ci-success.
  app-screenshots:
    needs: [changes, app]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.app == 'true' &&
      needs.app.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAESTRO_VERSION: "1.39.9"
    steps:
      - name: Skip fork PRs
        id: gate
        run: |
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "Fork PRs cannot write ci-screenshots or post gallery comments; skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - name: Enable KVM
        if: steps.gate.outputs.run == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        if: steps.gate.outputs.run == 'true'
        with:
          distribution: temurin
          java-version: "21"

      - name: AVD cache
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-api30-x86_64-default-pixel6

      - name: Download QA debug APK
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: qa-debug-apk
          path: apk

      - name: Install Maestro CLI
        if: steps.gate.outputs.run == 'true'
        env:
          # Installer reads MAESTRO_VERSION (bump only in deliberate PRs).
          MAESTRO_VERSION: ${{ env.MAESTRO_VERSION }}
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version

      - name: Make screenshot scripts executable
        if: steps.gate.outputs.run == 'true'
        run: chmod +x .github/scripts/screenshots/*.sh

      - name: Run emulator + Maestro gallery
        if: steps.gate.outputs.run == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          # One line only: android-emulator-runner runs each script line in a fresh /usr/bin/sh -c.
          script: .github/scripts/screenshots/run-gallery.sh "${{ github.event.pull_request.head.sha }}" "${{ github.event.pull_request.number }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Maestro outputs
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: |
            maestro-out/
            gallery/
          retention-days: 7
          if-no-files-found: warn

  ci-success:
    needs: [changes, core, backend, app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require passing jobs
        env:
          CHANGES: ${{ needs.changes.result }}
          CORE_ENABLED: ${{ needs.changes.outputs.core }}
          CORE_RESULT: ${{ needs.core.result }}
          BACKEND_ENABLED: ${{ needs.changes.outputs.backend }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          APP_ENABLED: ${{ needs.changes.outputs.app }}
          APP_RESULT: ${{ needs.app.result }}
        run: |
          fail() { echo "$1"; exit 1; }

          [[ "$CHANGES" == "success" ]] || fail "changes job failed"

          if [[ "$CORE_ENABLED" == "true" ]]; then
            [[ "$CORE_RESULT" == "success" ]] || fail "core job failed"
          elif [[ "$CORE_RESULT" != "skipped" ]]; then
            fail "core job unexpected result: $CORE_RESULT"
          fi

          if [[ "$BACKEND_ENABLED" == "true" ]]; then
            [[ "$BACKEND_RESULT" == "success" ]] || fail "backend job failed"
          elif [[ "$BACKEND_RESULT" != "skipped" ]]; then
            fail "backend job unexpected result: $BACKEND_RESULT"
          fi

          if [[ "$APP_ENABLED" == "true" ]]; then
            [[ "$APP_RESULT" == "success" ]] || fail "app job failed"
          elif [[ "$APP_RESULT" != "skipped" ]]; then
            fail "app job unexpected result: $APP_RESULT"
          fi

          echo "CI passed"

  mark-cursor-pr-ready:
    needs: ci-success
    if: |
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      needs.ci-success.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Mark Cursor agent PR ready for review
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          EVENT_AUTHOR: ${{ github.event.pull_request.user.login }}
          EVENT_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail

          echo "event author: $EVENT_AUTHOR"
          echo "event draft: $EVENT_DRAFT"

          if [[ "$EVENT_AUTHOR" != "cursor[bot]" ]]; then
            echo "Skipping: event author is not cursor[bot]"
            exit 0
          fi

          if [[ "$EVENT_DRAFT" != "true" ]]; then
            echo "Skipping: event draft is not true"
            exit 0
          fi

          live="$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '{user: .user.login, draft: .draft}')"
          echo "live PR: $live"

          gh pr ready "$PR_NUMBER" --repo "$REPO"
